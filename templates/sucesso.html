<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Check-in concluído · White Sand Apartments</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="site-header">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="site-logo">
  </header>
  <main class="card" style="text-align:center">
    <div class="ok-badge" style="margin:0 auto 16px">✓</div>
    <h1>Check-in concluído!</h1>
    <p class="sub">Obrigado, <strong>{{ boletim.apelido }} {{ boletim.nome }}</strong>.<br>
      O seu registo foi submetido com sucesso.</p>

    <div class="resumo" style="text-align:left;margin:20px 0">
      <div><span>Entrada</span> {{ boletim.data_entrada }}</div>
      {% if boletim.data_saida %}<div><span>Saída</span> {{ boletim.data_saida }}</div>{% endif %}
    </div>

    <p class="nota">Pode fechar esta página. Boas férias! 🌊</p>
  </main>
</body>
</html>
